name: Generate Snake

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "41 6 * * *"

permissions:
  contents: write

concurrency:
  group: profile-snake
  cancel-in-progress: true

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/snake.svg
            .github/assets/snake-dark.svg?palette=github-dark

      - name: Commit refreshed snake assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/snake.svg .github/assets/snake-dark.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh contribution snake [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main; then
              git push && exit 0
            else
              git rebase --abort || true
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push refreshed snake assets after 3 attempts." >&2
              exit 1
            fi
            sleep 5
          done
