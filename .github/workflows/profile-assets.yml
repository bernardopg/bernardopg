name: Refresh profile assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/profile-assets.yml
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: read

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate SVG assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate profile metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: .github/assets/metrics.base.svg
          output_action: none
          base: header,activity,community,repositories,metadata
          config_timezone: America/Sao_Paulo
          repositories_forks: no
          repositories_affiliations: owner

      - name: Generate language metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: .github/assets/metrics.languages.svg
          output_action: none
          base: ""
          config_timezone: America/Sao_Paulo
          repositories_forks: no
          repositories_affiliations: owner
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size,percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_other: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5

      - name: Collect generated metrics
        shell: bash
        run: |
          mkdir -p .github/assets
          cp -r /metrics_renders/.github/assets/. .github/assets/

      - name: Generate contribution animations
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/snake.svg?palette=github-light&color_snake=#7C3AED&color_dots=#ebedf0,#ddd6fe,#c4b5fd,#8b5cf6,#06b6d4
            .github/assets/snake-dark.svg?palette=github-dark&color_snake=#22D3EE&color_dots=#161b22,#312e81,#5b21b6,#7c3aed,#22d3ee

      - name: Upload generated assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile-assets
          path: |
            .github/assets/metrics.base.svg
            .github/assets/metrics.languages.svg
            .github/assets/snake.svg
            .github/assets/snake-dark.svg
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  publish:
    name: Publish SVG assets
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: profile-assets
          path: .github/assets

      - name: Commit refreshed assets
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/metrics.base.svg .github/assets/metrics.languages.svg
          git add .github/assets/snake.svg .github/assets/snake-dark.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile assets [skip ci]"

          for attempt in 1 2 3; do
            if git pull --rebase origin "$TARGET_BRANCH"; then
              git push origin "HEAD:$TARGET_BRANCH" && exit 0
            else
              git rebase --abort || true
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to publish refreshed profile assets after 3 attempts." >&2
              exit 1
            fi

            sleep 5
          done
