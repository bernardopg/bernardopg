name: Generate Metrics

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate base metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: bernardopg
          filename: .github/assets/metrics.base.svg
          output_action: none
          base: header,activity,community,repositories,metadata
          config_timezone: America/Sao_Paulo
          repositories_forks: no
          repositories_affiliations: owner
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_delay: 30

      - name: Generate language metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: bernardopg
          filename: .github/assets/metrics.languages.svg
          output_action: none
          base: ""
          config_timezone: America/Sao_Paulo
          repositories_forks: no
          repositories_affiliations: owner
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size,percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_other: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5

      - name: Move generated metrics into repository
        run: |
          mkdir -p .github/assets
          cp -r /metrics_renders/.github/assets/. .github/assets/

      - name: Commit refreshed metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/metrics.base.svg .github/assets/metrics.languages.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile metrics [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main; then
              git push && exit 0
            else
              git rebase --abort
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push refreshed metrics after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 5
          done
