    <radialGradient id="glowPurple">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan">
