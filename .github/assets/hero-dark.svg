<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Bernardo Gomes</title>
  <desc id="desc">Product engineer building software for web, Linux, automation, and healthcare.</desc>
  <defs>
