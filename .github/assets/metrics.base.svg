<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">Profile metrics placeholder</title>
  <desc id="desc">Placeholder card shown until GitHub Actions renders live profile metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#134e4a" />
    </linearGradient>
  </defs>
  <rect width="860" height="420" rx="24" fill="url(#bg)" />
  <rect x="24" y="24" width="812" height="372" rx="18" fill="#0b1220" stroke="#1f2937" />
  <text x="48" y="96" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">Generating live GitHub metrics...</text>
  <text x="48" y="150" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">The workflow will replace this placeholder after the first run.</text>
  <text x="48" y="212" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20">Expected output:</text>
  <text x="48" y="252" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">- contribution and repository summary</text>
  <text x="48" y="286" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">- community and activity signals</text>
  <text x="48" y="320" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">- automated refresh from GitHub Actions</text>
</svg>
